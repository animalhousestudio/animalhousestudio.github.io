<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SALOTTO - Animal House</title>
    <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <link href="css/salotto.css" rel="stylesheet">
</head>
<body>

    <header>
        <a href="index.html" class="back-btn" id="ui-back">< TORNA ALLA CASA</a>
        <h1 id="ui-title">SALOTTO</h1>
        <div style="width: 150px;"></div>
    </header>

    <div class="room-container">
        <div class="left-col">
            <img src="assets/images/salotto.jpg" alt="Salotto" class="room-image" loading="lazy" decoding="async">
            <p class="room-description" id="ui-desc">
                Il luogo del ritrovo, dove si chiacchiera e si ascolta.
            </p>
        </div>

        <div class="right-col">
            <h2 class="artists-title" id="ui-entities">ENTITÀ PRESENTI</h2>
            <ul class="artist-list" id="artistList"></ul>
        </div>
    </div>

    <div class="modal-overlay" id="bioModal">
        <div class="bio-box">
            <button class="close-btn" id="closeBioModal">X</button>
            <img src="" alt="" class="bio-img" id="bioImg">
            <h2 class="bio-name" id="bioName"></h2>
            <p class="bio-text" id="bioText"></p>
            <a href="#" target="_blank" class="bio-link-btn" id="bioLink">LINK</a>
        </div>
    </div>

    <script src="js/salotto.js" defer></script>
</body>
</html>
