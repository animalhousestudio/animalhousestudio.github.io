<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal House - Mobile Fix</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'DM Mono';
            src: url('https://fonts.gstatic.com/s/dmmono/v14/aFTU7PB1QTsUX8KYthqQBK6PYK0.woff2');
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Mono', monospace;
            background-color: #0b0b1a;
            color: white;
            overflow: hidden;
        }

        /* --- INTRO LAYER --- */
        #intro-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: #000;
            transition: opacity 1.5s ease-out, visibility 1.5s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            object-fit: cover;
            z-index: -2;
            opacity: 0.6;
        }

        /* LOGO */
        .logo-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo {
            max-width: 80%;
            max-height: 40vh;
            opacity: 0;
            animation: logoFadeInImage 2s ease-out forwards, continuousPsycho 3s infinite alternate;
            will-change: transform, filter, opacity;
            z-index: 1;
            position: relative;
        }

        .logo-stick {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            background-color: white;
            border-radius: 0 0 10px 10px;
            height: 50vh;
            transform: translateX(-50%);
            z-index: 0;
            opacity: 0;
            animation: logoFadeInStick 2s ease-out forwards;
        }

        @keyframes logoFadeInImage {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        @keyframes logoFadeInStick {
            0% { opacity: 0; transform: translateX(-50%) scaleY(0); transform-origin: top; }
            100% { opacity: 1; transform: translateX(-50%) scaleY(1); transform-origin: top; }
        }

        @keyframes continuousPsycho {
            0% { filter: hue-rotate(0deg) brightness(100%) blur(0px); transform: scale(1); }
            50% { filter: hue-rotate(180deg) brightness(130%) blur(2px); transform: scale(1.02); }
            100% { filter: hue-rotate(360deg) brightness(100%) blur(0px); transform: scale(1); }
        }

        .fade-out { opacity: 0; visibility: hidden; pointer-events: none; }

        /* --- MAIN LAYER --- */
        #main-layer {
            position: relative;
            width: 100%;
            min-height: 100vh;
            opacity: 0;
            transition: opacity 2s ease-in;
            display: flex;
            justify-content: center;
        }

        .house-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .house-img {
            display: block;
            width: 100%;
            height: auto;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        /*
         * SVG OVERLAY — si sovrappone esattamente all'immagine.
         * Le coordinate nei <rect> sono in % rispetto a viewBox="0 0 100 100".
         * In questo modo funzionano su qualsiasi dimensione dello schermo.
         */
        .house-svg-map {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            /* width/height impostati da JS per seguire esattamente l'immagine */
        }

        .house-svg-map polygon {
            pointer-events: all;
            cursor: pointer;
            fill: transparent;
            /* DEBUG: decommentare per vedere le zone
            fill: rgba(255,0,0,0.25); stroke: red; stroke-width: 0.3; */
        }

        #light-flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; opacity: 0; pointer-events: none; z-index: 8000;
            transition: opacity 0.1s;
        }
        .flash-active { opacity: 0.8 !important; }

        /* --- TOOLBAR --- */
        .toolbar {
            position: fixed; top: 20px; right: 20px; z-index: 9000;
            display: flex; gap: 15px; opacity: 0; transition: opacity 2s ease-in;
        }
        .tool-btn {
            width: 40px; height: 40px; border: none; background: transparent;
            cursor: pointer; opacity: 0.6; transition: opacity 0.3s, transform 0.3s;
            animation: gentlePulse 3s infinite ease-in-out;
            display: flex; align-items: center; justify-content: center;
        }
        .tool-btn svg { width: 100%; height: 100%; fill: white; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        .tool-btn:hover { opacity: 1; transform: scale(1.1); }
        @keyframes gentlePulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 0.5; } }

        /* --- MODALS --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); z-index: 1000; display: none; opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { display: block; opacity: 1; }
        .menu-box {
            background-color: #eaddcf; color: #3e3228; border: 2px solid #bda88e;
            padding: 1.5rem 2rem; width: fit-content; min-width: 200px; max-width: 300px;
            border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(160, 140, 100, 0.2);
            transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center; position: absolute; top: 50%; transform: translateY(-50%) scale(0.9);
        }
        .modal-overlay.active .menu-box { transform: translateY(-50%) scale(1); }
        .menu-pos-right { left: calc(50% + 250px); right: auto; }
        .menu-pos-left { right: calc(50% + 250px); left: auto; }
        .menu-box.vision-box {
            max-width: 600px; width: 80%; min-height: 50vh; text-align: left;
            display: flex; flex-direction: column; left: 50%; top: 50%;
            transform: translate(-50%, -50%) scale(0.9); position: absolute;
        }
        .modal-overlay.active .menu-box.vision-box { transform: translate(-50%, -50%) scale(1); }
        .room-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 1rem; opacity: 0.7; border-bottom: 1px solid rgba(62, 50, 40, 0.2); padding-bottom: 0.5rem; font-weight: bold; }
        .artist-list { list-style: none; font-size: 1.1rem; font-weight: bold; padding: 0; }
        .artist-list li { margin: 0.6rem 0; cursor: pointer; transition: color 0.2s, transform 0.2s; }
        .artist-list li:hover { color: #d65d0e; transform: scale(1.05); }
        #typewriter { white-space: pre-wrap; text-transform: uppercase; font-size: 0.9rem; line-height: 1.6; flex-grow: 1; color: #3e3228; }
        .lang-switch { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 1rem; }
        .lang-btn { background: transparent; border: 1px solid #3e3228; color: #3e3228; font-family: 'DM Mono', monospace; padding: 2px 8px; font-size: 0.7rem; cursor: pointer; opacity: 0.5; border-radius: 5px; }
        .lang-btn.active { opacity: 1; background: #3e3228; color: #eaddcf; }

        /* Mobile: modal centrato nel visual viewport (corretto per zoom/scroll) */
        @media (max-width: 768px) {
            .logo { max-width: 55%; max-height: 35vh; margin: 0 auto; }
            .logo-container { width: 100%; display: flex; flex-direction: column; justify-content: center; }
            .logo-stick { width: 8px; }

            /* Il modal usa position:fixed ma viene riposizionato via JS con visualViewport */
            .modal-overlay { display: none; }
            .modal-overlay.active { display: block; }

            /* Room menu-box: non usa più top/left CSS, li imposta il JS */
            #roomMenuBox {
                position: fixed;
                top: auto; left: auto; right: auto;
                transform: scale(0.9);
                margin: 0;
                transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }
            .modal-overlay.active #roomMenuBox { transform: scale(1); }
            .menu-pos-right, .menu-pos-left { left: auto; right: auto; }

            /* Vision box rimane centrato normale */
            .modal-overlay.active { display: flex; justify-content: center; align-items: center; }
            #roomModal.active { display: block; } /* sovrascrive il flex per room modal */
            .menu-box.vision-box { transform: scale(0.9); position: relative; top: auto; left: auto; }
            .modal-overlay.active .menu-box.vision-box { transform: scale(1); }
            .toolbar { top: 10px; right: 10px; gap: 10px; }
        }
    </style>
</head>
<body>
    <div id="intro-layer">
        <video playsinline autoplay muted loop class="video-bg">
            <source src="sfondo1.mp4" type="video/mp4">
        </video>
        <div class="logo-container">
            <img src="logo2.png" class="logo" alt="Animal House Logo">
            <div class="logo-stick"></div>
        </div>
    </div>

    <div class="toolbar" id="toolbar">
        <button class="tool-btn" id="btn-audio"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
        <button class="tool-btn" id="btn-light"><svg viewBox="0 0 24 24"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.85 11.1l-.85.6V16h-4v-2.3l-.85-.6C7.8 12.16 7 10.63 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.63-.8 3.16-2.15 4.1z"/></svg></button>
        <button class="tool-btn" id="btn-vision"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg></button>
        <a href="https://www.instagram.com/animalhouse_collective" target="_blank" class="tool-btn"><svg viewBox="0 0 24 24"><path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2m-.2 2A3.6 3.6 0 0 0 3.8 7.6v8.8A3.6 3.6 0 0 0 7.6 20.4h8.8a3.6 3.6 0 0 0 3.8-3.8V7.6A3.6 3.6 0 0 0 16.4 4H7.6m9.65 1.5a1.25 1.25 0 0 1 1.25 1.25A1.25 1.25 0 0 1 17.25 8 1.25 1.25 0 0 1 16 6.75a1.25 1.25 0 0 1 1.25-1.25M12 7a5 5 0 0 1 5 5 5 5 0 0 1-5 5 5 5 0 0 1-5-5 5 5 0 0 1 5-5m0 2a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg></a>
    </div>

    <div id="light-flash-overlay"></div>

    <div id="main-layer">
        <div class="house-container" id="houseWrapper">
            <img src="casa.jpg" class="house-img" id="houseImage" alt="Animal House Pixel Art">

            <!--
                SVG IMAGE MAP — viewBox="0 0 100 100" significa che tutte le coordinate
                sono percentuali dell'immagine. Funziona perfettamente su qualsiasi dimensione.

                Per regolare una zona: modifica x, y, width, height del rect corrispondente.
                x=0 è il bordo sinistro, x=100 è il bordo destro dell'immagine.
                y=0 è il top, y=100 è il bottom.

                PER ATTIVARE LA MODALITÀ DEBUG (vedere le zone rosse):
                decommentare le righe fill/stroke nei rettangoli qui sotto.
            -->
            <svg class="house-svg-map"
                 viewBox="0 0 100 100"
                 preserveAspectRatio="none"
                 xmlns="http://www.w3.org/2000/svg">

                <!-- OSSERVATORIO -->
                <polygon
                    data-room="OSSERVATORIO"
                    points="46.91,3.35 77.06,5.82 86.03,29.2 68.68,36.31 35.29,26.44"
                />

                <!-- SALOTTO -->
                <polygon
                    data-room="SALOTTO"
                    points="33.97,27.43 81.32,39.66 52.35,54.36 6.91,39.86"
                />

                <!-- CUCINA -->
                <polygon
                    data-room="CUCINA"
                    points="6.18,42.42 83.68,62.06 46.76,72.02 9.85,59.2 5.88,43.71 91.91,63.54"
                />

                <!-- CANTINA -->
                <polygon
                    data-room="CANTINA"
                    points="23.97,63.93 71.76,78.04 52.94,85.05 21.62,72.52 39.85,73.21 80,63.24 76.03,77.74 22.35,72.02"
                />

                <!-- CORTILE -->
                <polygon
                    data-room="CORTILE"
                    points="1.76,65.91 77.06,94.42 41.32,100 0,91.75"
                />

                <!-- CAMPETTO -->
                <polygon
                    data-room="CAMPETTO"
                    points="53.68,84.95 80.15,76.26 98.68,83.27 73.68,92.44"
                />

            </svg>
        </div>
    </div>

    <div class="modal-overlay" id="roomModal">
        <div class="menu-box" id="roomMenuBox">
            <div class="room-title" id="modalTitle">STANZA</div>
            <ul class="artist-list" id="modalList"></ul>
        </div>
    </div>

    <div class="modal-overlay" id="visionModal">
        <div class="menu-box vision-box">
            <div class="lang-switch">
                <button class="lang-btn" id="btn-it">IT</button>
                <button class="lang-btn" id="btn-en">EN</button>
            </div>
            <div id="typewriter"></div>
        </div>
    </div>
    <audio id="logoAudio" src="logoAudio.mp3" loop></audio>

    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const introLayer = document.getElementById('intro-layer');
        const mainLayer = document.getElementById('main-layer');
        const toolbar = document.getElementById('toolbar');
        setTimeout(() => {
            introLayer.classList.add('fade-out');
            mainLayer.style.opacity = '1';
            toolbar.style.opacity = '1';
            document.body.style.overflowY = 'auto';
            const video = introLayer.querySelector('video');
            if(video) video.pause();
        }, 7000);

        const audio = document.getElementById('logoAudio');
        const btnAudio = document.getElementById('btn-audio');
        let isPlaying = false;
        btnAudio.addEventListener('click', (e) => { e.stopPropagation(); if (isPlaying) { audio.pause(); btnAudio.style.opacity = '0.5'; } else { audio.play(); btnAudio.style.opacity = '1'; } isPlaying = !isPlaying; });

        // ── Sincronizza SVG esattamente sui pixel dell'immagine ──────────────
        // Necessario perché su mobile l'immagine non sempre riempie il container
        // con le stesse proporzioni: l'SVG deve seguire i bounds reali dell'img.
        const houseSvg = document.querySelector('.house-svg-map');
        const houseWrapper = document.getElementById('houseWrapper');

        function syncSvgToImage() {
            const imgRect     = houseImage.getBoundingClientRect();
            const wrapRect    = houseWrapper.getBoundingClientRect();
            houseSvg.style.left   = (imgRect.left - wrapRect.left) + 'px';
            houseSvg.style.top    = (imgRect.top  - wrapRect.top)  + 'px';
            houseSvg.style.width  = imgRect.width  + 'px';
            houseSvg.style.height = imgRect.height + 'px';
        }

        // Esegui subito, dopo il caricamento immagine, e ad ogni resize/orientamento
        if (houseImage.complete) syncSvgToImage();
        houseImage.addEventListener('load', syncSvgToImage);
        window.addEventListener('resize', syncSvgToImage);
        window.addEventListener('orientationchange', () => setTimeout(syncSvgToImage, 300));
        // ─────────────────────────────────────────────────────────────────────

        const btnLight = document.getElementById('btn-light');
        const houseImg = document.getElementById('houseImage');
        const flashOverlay = document.getElementById('light-flash-overlay');
        let lightsOn = false;
        btnLight.addEventListener('click', (e) => { e.stopPropagation(); lightsOn = !lightsOn; flashOverlay.classList.add('flash-active'); setTimeout(() => { flashOverlay.classList.remove('flash-active'); }, 150); setTimeout(() => { houseImg.src = lightsOn ? 'casa2.jpg' : 'casa.jpg'; }, 50); });

        // SVG zones — poligoni calibrati
        const svgZones = document.querySelectorAll('.house-svg-map polygon');
        const roomModal = document.getElementById('roomModal');
        const roomMenuBox = document.getElementById('roomMenuBox');
        const modalTitle = document.getElementById('modalTitle');
        const modalList = document.getElementById('modalList');

        const roomData = {
            'OSSERVATORIO': { artists: ['CORASAN', 'CARLO MARTINELLI', 'BORSTAL', 'GIUSEPPE FALCO', 'VERA DI LECCE'], side: 'right' },
            'SALOTTO':      { artists: ['HAMAKA', 'NO LUCIFER'], side: 'left' },
            'CUCINA':       { artists: ['CHOCOLATE AND RECORDS',  'CHEF MARIO FONTANA'], side: 'right' },
            'CANTINA':      { artists: ['TECHNO BORSTAL', 'LEMON LIGHTS', 'BABYKATT', 'LUC PRIMOS'], side: 'left' },
            'CORTILE':      { artists: ['MARLA', 'ALTRA BANDA CON DE TOMA'], side: 'right' },
            'CAMPETTO':     { artists: ['FUORIROTTA E SENTINELLA', 'MAGNUS CARLSEN', 'JOVANOTTI', 'BAGGIO', 'QVINTO'], side: 'left' }
        };

        svgZones.forEach(zone => {
            zone.addEventListener('click', function(e) {
                e.stopPropagation();
                const roomName = this.getAttribute('data-room');
                openRoom(roomName);
            });
        });

        function openRoom(name) {
            const data = roomData[name];
            if (!data) return;
            modalTitle.textContent = name;
            modalList.innerHTML = '';
            data.artists.forEach(artist => {
                const li = document.createElement('li');
                li.textContent = artist;
                modalList.appendChild(li);
            });
            roomMenuBox.classList.remove('menu-pos-left', 'menu-pos-right');
            if (data.side === 'left') {
                roomMenuBox.classList.add('menu-pos-left');
            } else {
                roomMenuBox.classList.add('menu-pos-right');
            }
            roomModal.classList.add('active');
            positionRoomModal();
        }

        // Posiziona il menu stanza al centro del visual viewport (funziona anche con zoom/scroll mobile)
        function positionRoomModal() {
            if (window.innerWidth > 768) return; // solo mobile, desktop usa CSS

            const vvp = window.visualViewport;
            if (!vvp) return;

            // Centro del visual viewport in coordinate della pagina
            const centerX = vvp.offsetLeft + vvp.width  / 2;
            const centerY = vvp.offsetTop  + vvp.height / 2;

            // Dimensioni approssimate del box
            const boxW = Math.min(280, vvp.width * 0.8);
            const boxH = roomMenuBox.offsetHeight || 200;

            roomMenuBox.style.left   = (centerX - boxW / 2) + 'px';
            roomMenuBox.style.top    = (centerY - boxH / 2) + 'px';
            roomMenuBox.style.width  = boxW + 'px';
        }

        // Aggiorna posizione se l'utente scrolla/zooma mentre il modal è aperto
        if (window.visualViewport) {
            window.visualViewport.addEventListener('scroll', () => { if (roomModal.classList.contains('active')) positionRoomModal(); });
            window.visualViewport.addEventListener('resize', () => { if (roomModal.classList.contains('active')) positionRoomModal(); });
        }

        const visionModal = document.getElementById('visionModal');
        const typewriter = document.getElementById('typewriter');

        // Bottone ? apre il modal visione
        const btnVision = document.getElementById('btn-vision');
        btnVision.addEventListener('click', (e) => { e.stopPropagation(); openVision(); });

        function openVision() { visionModal.classList.add('active'); startTypewriter(); }

        [roomModal, visionModal].forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) { closeModals(); }
            });
        });
        function closeModals() { roomModal.classList.remove('active'); visionModal.classList.remove('active'); stopTypewriter(); }

        const contentIT = `TOCCA I POSTI DELLA CASA PER SCOPRIRE AMBIENTI E ANIMALI.\n\nANIMAL HOUSE È UN COLLETTIVO DI ARTISTI CHE COLLABORANO IN MODO SELVAGGIO, BASATO SU CONNESSIONI EMOTIVE E UMANE. FACCIAMO COSE LEGGERE O COSE PESANTI, A SECONDA DELLA SITUAZIONE. SE VUOI TOCCACI..\n\n[ TOCCACI ]`;
        const contentEN = `TOUCH THE SPOTS OF THE HOUSE TO DISCOVER ROOMS AND ANIMALS.\n\nANIMAL HOUSE IS A COLLECTIVE OF ARTISTS WHO COLLABORATE IN A WILD WAY, BASED ON EMOTIONAL AND HUMAN CONNECTIONS. WE DO LIGHT THINGS OR HEAVY THINGS, IF YOU WANT YOU CAN TOUCH US...\n\n[ TOUCH US ]`;
        let currentLang = 'en'; let typeInterval;

        fetch('https://ipinfo.io/json?token=58560eedaa6c7d').then(res => res.json()).then(data => { if(data.country === 'IT') { currentLang = 'it'; updateLangButtons(); } }).catch(() => {});

        const btnIT = document.getElementById('btn-it'); const btnEN = document.getElementById('btn-en');
        btnIT.addEventListener('click', (e) => { e.stopPropagation(); setLang('it'); });
        btnEN.addEventListener('click', (e) => { e.stopPropagation(); setLang('en'); });
        function setLang(lang) { currentLang = lang; updateLangButtons(); startTypewriter(); }
        function updateLangButtons() { if(currentLang === 'it') { btnIT.classList.add('active'); btnEN.classList.remove('active'); } else { btnEN.classList.add('active'); btnIT.classList.remove('active'); } }
        function startTypewriter() { clearInterval(typeInterval); typewriter.innerHTML = ''; const text = currentLang === 'it' ? contentIT : contentEN; let i = 0; typeInterval = setInterval(() => { if (i < text.length) { typewriter.innerHTML += text.charAt(i); i++; } else { clearInterval(typeInterval); finalizeText(); } }, 30); }
        function stopTypewriter() { clearInterval(typeInterval); }
        function finalizeText() { const text = currentLang === 'it' ? contentIT : contentEN; typewriter.innerHTML = text.replace('[ TOCCACI ]', '<a href="https://www.instagram.com/animalhouse_collective" target="_blank" style="color:#d65d0e; font-weight:bold; text-decoration:none;">[ TOCCACI ]</a>').replace('[ TOUCH US ]', '<a href="https://www.instagram.com/animalhouse_collective" target="_blank" style="color:#d65d0e; font-weight:bold; text-decoration:none;">[ TOUCH US ]</a>'); }
        typewriter.addEventListener('click', function() { clearInterval(typeInterval); finalizeText(); });
    });
    </script>
</body>
</html>
