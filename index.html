<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal House</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <link href="css/index.css" rel="stylesheet">
</head>
<body>

    <div id="landing-screen">
        <div class="landing-video-container">
            <video playsinline webkit-playsinline disablePictureInPicture muted loop id="bgVideo">
                <source src="assets/video/sfondo.mp4" type="video/mp4">
            </video>
        </div>
        <div class="landing-content">
            <div class="landing-logo-container">
                <img src="assets/images/logo2.png" id="landing-logo" class="landing-logo" alt="Animal House Logo">
                <div id="landing-trigger" class="landing-logo-overlay"></div>
            </div>
            <div class="landing-language-switcher">
                <button class="main-lang-btn" data-lang="it">IT</button>
                <span class="lang-separator">/</span>
                <button class="main-lang-btn" data-lang="en">EN</button>
                <span class="lang-separator">/</span>
                <button class="main-lang-btn" data-lang="fr">FR</button>
            </div>
            <div class="landing-bottom-content">
                <div class="landing-tagline">ANIMAL HOUSE È QUELLO CHE È SE TI PIACE</div>
                <div class="landing-links">
                    <a id="vision-link">VISIONE</a>
                    <a href="https://www.instagram.com/animalhou_se" target="_blank" id="touch-link">CONTATTO</a>
                </div>
            </div>
        </div>
    </div>

    <div id="intro-layer">
        <video id="intro-video" playsinline webkit-playsinline disablePictureInPicture muted loop class="video-bg">
            <source src="assets/video/sfondo1.mp4" type="video/mp4">
        </video>
        <div class="logo-container">
            <img src="assets/images/logo2.png" id="intro-logo" class="logo" alt="Animal House Logo">
            <div id="intro-stick" class="logo-stick"></div>
        </div>
    </div>

    <div class="toolbar" id="toolbar">
        <div class="dropdown-wrapper">
            <button class="tool-btn" id="btn-rooms-menu">
                <svg viewBox="0 0 24 24"><path d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5S3.17 7.5 4 7.5 5.5 6.83 5.5 6 4.83 4.5 4 4.5zm0 12c-.83 0-1.5.68-1.5 1.5s.68 1.5 1.5 1.5 1.5-.68 1.5-1.5-.67-1.5-1.5-1.5zM7 19h14v-2H7v2zm0-6h14v-2H7v2zm0-8v2h14V5H7z"/></svg>
            </button>
            <div id="rooms-dropdown" class="rooms-dropdown">
                <a href="osservatorio.html" class="room-dropdown-item" data-room-key="OSSERVATORIO">Osservatorio</a>
                <a href="salotto.html" class="room-dropdown-item" data-room-key="SALOTTO">Salotto</a>
                <a href="cucina.html" class="room-dropdown-item" data-room-key="CUCINA">Cucina</a>
                <a href="cantina.html" class="room-dropdown-item" data-room-key="CANTINA">Cantina</a>
                <a href="giardino.html" class="room-dropdown-item" data-room-key="GIARDINO">Giardino</a>
                <a href="campetto.html" class="room-dropdown-item" data-room-key="CAMPETTO">Campetto</a>
            </div>
        </div>

        <button class="tool-btn" id="btn-light"><svg viewBox="0 0 24 24"><path d="M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.85 11.1l-.85.6V16h-4v-2.3l-.85-.6C7.8 12.16 7 10.63 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.63-.8 3.16-2.15 4.1z"/></svg></button>
        <button class="tool-btn" id="btn-audio"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
        <button class="tool-btn" id="btn-vision"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg></button>
        <a href="https://www.instagram.com/animalhou_se/" target="_blank" class="tool-btn"><svg viewBox="0 0 24 24"><path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2m-.2 2A3.6 3.6 0 0 0 3.8 7.6v8.8A3.6 3.6 0 0 0 7.6 20.4h8.8a3.6 3.6 0 0 0 3.8-3.8V7.6A3.6 3.6 0 0 0 16.4 4H7.6m9.65 1.5a1.25 1.25 0 0 1 1.25 1.25A1.25 1.25 0 0 1 17.25 8 1.25 1.25 0 0 1 16 6.75a1.25 1.25 0 0 1 1.25-1.25M12 7a5 5 0 0 1 5 5 5 5 0 0 1-5 5 5 5 0 0 1-5-5 5 5 0 0 1 5-5m0 2a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg></a>
    </div>

    <div id="light-flash-overlay"></div>

    <div id="main-layer">
        <div class="house-container" id="houseWrapper">
            <img src="assets/images/casa2.jpg" class="house-img" id="houseImage" alt="Animal House Pixel Art">

            <a href="live.html" class="spaceship-link">
                <img src="assets/images/astronave.gif" class="spaceship-img" alt="Astronave" loading="lazy" decoding="async">
            </a>

            <svg class="house-svg-map" viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                <polygon data-room="OSSERVATORIO" points="46.91,3.35 77.06,5.82 86.03,29.2 68.68,36.31 35.29,26.44"/>
                <polygon data-room="SALOTTO" points="33.97,27.43 81.32,39.66 52.35,54.36 6.91,39.86"/>
                <polygon data-room="CUCINA" points="6.18,42.42 83.68,62.06 46.76,72.02 9.85,59.2 5.88,43.71 91.91,63.54"/>
                <polygon data-room="CANTINA" points="23.97,63.93 71.76,78.04 52.94,85.05 21.62,72.52 39.85,73.21 80,63.24 76.03,77.74 22.35,72.02"/>
                <polygon data-room="GIARDINO" points="23.38,78.14 48.38,85.34 36.32,90.77 12.79,83.47"/>
                <polygon data-room="CAMPETTO" points="75.44,77.65 87.94,81.99 74.26,87.02 60.88,82.48"/>
            </svg>

            <div id="hawk-layer">
                <div id="hawk-sprite" class="hawk-sprite" aria-hidden="true"><div class="hawk-flap"></div></div>
            </div>

            <div id="kittens-layer">
                <div id="hawk-tooltip" class="hawk-tooltip">FALCO</div>
                <div id="kitten-tooltip" class="kitten-tooltip"><a href="#" id="kitten-tooltip-link"></a></div>

                <img src="assets/images/marla.gif" id="marla-char" alt="Marla" style="left: 33%; top: 90%;" loading="lazy" decoding="async">
                <img src="assets/images/dodi.gif" id="dodi-char" alt="Dodi" style="left: 45%; top: 42%;" loading="lazy" decoding="async">
                <img src="assets/images/milko1.gif" id="milko-char" alt="Milko" style="left: 33%; top: 63%;" loading="lazy" decoding="async">
                <img src="assets/images/hamaka.gif" id="hamaka-char" alt="Hamaka" style="left: 20%; top: 80%;" loading="lazy" decoding="async">
                <img src="assets/images/corasan.gif" id="corasan-char" alt="Corasan" style="left: 54%; top: 32%;" loading="lazy" decoding="async">
                <img src="assets/images/febo.gif" id="febo-char" alt="Febo" style="left: 67%; top: 82%;" loading="lazy" decoding="async">
                <img src="assets/images/marlo.gif" id="marlo-char" alt="Carlo Martinelli" style="left: 70%; top: 32%;" loading="lazy" decoding="async">
                <img src="assets/images/fish.gif" id="fish-char" alt="Fisheye" style="left: 46%; top: 50%;" loading="lazy" decoding="async">
                <img src="assets/images/anthonio.gif" id="anthonio-char" alt="Anthonio" style="left: 47%; top: 30%;" loading="lazy" decoding="async">

                <img src="assets/images/anima.gif" id="anima-char" alt="Anima Hoverboard" style="left: 85%; top: 20%;" loading="lazy" decoding="async">

                <div class="kitten-unit idle" data-id="0"></div>
                <div class="kitten-unit idle" data-id="1"></div>
                <div class="kitten-unit idle" data-id="2"></div>
                <div class="kitten-unit idle" data-id="3"></div>
            </div>
        </div>
    </div>

    <div id="tutorial-overlay">
        <div class="tutorial-content">
            <button id="close-tutorial">✖</button>
            <video id="tutorial-video" playsinline webkit-playsinline muted loop>
                <source src="assets/video/tutorial.mp4" type="video/mp4">
            </video>
            <div id="tutorial-text" class="tutorial-text"></div>
        </div>
    </div>

    <div class="modal-overlay" id="roomModal">
        <div class="menu-box" id="roomMenuBox">
            <div class="room-title" id="modalTitle">STANZA</div>
            <ul class="artist-list" id="modalList"></ul>
        </div>
    </div>
    <div class="modal-overlay" id="visionModal">
        <div class="menu-box vision-box">
            <div class="lang-switch">
                <button class="lang-btn" id="btn-it">IT</button>
                <button class="lang-btn" id="btn-en">EN</button>
                <button class="lang-btn" id="btn-fr">FR</button>
            </div>
            <div id="typewriter"></div>
        </div>
    </div>

    <audio id="logoAudio" src="assets/audio/logoAudio.mp3" loop></audio>

    <script src="js/index.js" defer></script>
</body>
</html>
