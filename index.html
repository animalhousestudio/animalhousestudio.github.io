<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Animal House</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'DM Mono';
            src: url('https://fonts.gstatic.com/s/dmmono/v14/aFTU7PB1QTsUX8KYthqQBK6PYK0.woff2');
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { font-family: 'DM Mono', monospace; background-color: #0b0b1a; color: white; overflow: hidden; }

        /* HACK CONTRO IL TASTO PLAY NATIVO SU iOS/Android */
        video::-webkit-media-controls,
        video::-webkit-media-controls-enclosure,
        video::-webkit-media-controls-panel,
        video::-webkit-media-controls-start-playback-button,
        video::-webkit-media-controls-play-button,
        video::-webkit-media-controls-overlay-play-button { display: none !important; -webkit-appearance: none !important; }
        video { pointer-events: none !important; outline: none; }

        /* ========== LANDING ========== */
        #landing-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; background-color: #000;
            transition: opacity 1s ease-in-out, visibility 1s;
            display: flex; flex-direction: column;
        }
        .landing-video-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #000 url('fallback.gif') center center / cover no-repeat;
        }
        #bgVideo {
            position: absolute; min-width: 100%; min-height: 100%; width: auto; height: auto;
            top: 50%; left: 50%; transform: translate(-50%, -50%); object-fit: cover;
        }
        .landing-content {
            height: 100vh; display: flex; flex-direction: column;
            align-items: center; padding: 2rem; position: relative; z-index: 2;
        }
        .landing-logo-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            width: 100%; position: relative; isolation: isolate;
        }
        .landing-logo-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            cursor: pointer; z-index: 10;
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        }
        .landing-logo {
            max-width: 80%; max-height: 50vh; opacity: 0;
            animation: fadeIn 1s ease-in forwards, burnEffect 4s ease-in-out infinite 2s;
            filter: drop-shadow(0 0 0 transparent); mix-blend-mode: normal; transform-origin: center;
            -webkit-user-select: none; user-select: none;
        }
        @keyframes burnEffect {
            0%   { filter: drop-shadow(0 0 90px rgba(0,255,128,0.9)); transform: scale(1); mix-blend-mode: normal; }
            25%  { filter: drop-shadow(0 0 10px rgba(255,0,128,0.9)) drop-shadow(0 0 20px rgba(0,255,255,0.7)); transform: scale(1.03) rotate(0.5deg); mix-blend-mode: screen; opacity: 0.85; }
            50%  { filter: drop-shadow(0 0 15px rgba(128,0,255,0.8)) drop-shadow(0 0 25px rgba(255,255,0,0.6)); transform: scale(1.02) rotate(-0.5deg); mix-blend-mode: color-dodge; opacity: 0.95; }
            75%  { filter: drop-shadow(0 0 90px rgba(0,255,128,0.9)) drop-shadow(0 0 90px rgba(255,0,255,0.7)); transform: scale(1.03) rotate(0.25deg); mix-blend-mode: difference; opacity: 0.95; }
            100% { filter: drop-shadow(0 0 90px rgba(0,255,128,0.9)); transform: scale(1); mix-blend-mode: normal; opacity: 1; }
        }
        .landing-bottom-content {
            display: flex; flex-direction: column; align-items: center;
            margin-bottom: 2rem; width: 100%; gap: 2rem; margin-top: -2rem;
        }
        .landing-tagline {
            font-size: clamp(1rem, 4vw, 2rem); text-align: center; opacity: 0;
            animation: fadeIn 1s ease-in forwards 1s, blink 1s step-end infinite 3s;
            letter-spacing: 2px; padding: 0 1rem; line-height: 1.4;
        }
        .landing-links { display: flex; justify-content: center; gap: 2rem; font-size: clamp(0.8rem, 3vw, 1.2rem); width: 100%; }
        .landing-links a { color: white; text-decoration: none; transition: opacity 0.3s ease; opacity: 0; animation: fadeIn 1s ease-in forwards; animation-delay: 1.5s; cursor: pointer; }
        .landing-links a:hover { opacity: 0.7; }
        .landing-language-switcher { position: absolute; top: 20px; right: 20px; z-index: 20; opacity: 0; animation: fadeIn 1s ease-in forwards 2s; }
        .landing-language-switcher button { background: transparent; border: 1px solid white; color: white; padding: 5px 10px; cursor: pointer; font-family: 'DM Mono', monospace; transition: all 0.3s ease; }
        .landing-language-switcher button:hover { background: rgba(255,255,255,0.2); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        @media (max-width: 768px) {
            .landing-content { padding: 1rem; }
            .landing-logo-container { flex-grow: 0.5; padding-top: 2rem; }
            .landing-logo { max-height: 35vh; }
            .landing-tagline { font-size: clamp(0.9rem, 5vw, 1.4rem); letter-spacing: 1px; padding: 0 3.5rem; margin-top: 6rem; }
        }

        /* ========== INTRO LAYER ========== */
        #intro-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: #000;
            transition: opacity 1.5s ease-out, visibility 1.5s;
            display: none; align-items: center; justify-content: center;
        }
        .video-bg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            min-width: 100%; min-height: 100%; width: auto; height: auto;
            object-fit: cover; z-index: -2; opacity: 0.6;
        }
        .logo-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo { max-width: 80%; max-height: 40vh; opacity: 0; will-change: transform, filter, opacity; z-index: 1; position: relative; }
        .anim-logo { animation: logoFadeInImage 2s ease-out forwards, continuousPsycho 3s infinite alternate; }
        .logo-stick { position: absolute; top: 50%; left: 50%; width: 10px; background-color: white; border-radius: 0 0 10px 10px; height: 50vh; transform: translateX(-50%); z-index: 0; opacity: 0; }
        .anim-stick { animation: logoFadeInStick 2s ease-out forwards; }
        @keyframes logoFadeInImage { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes logoFadeInStick { 0% { opacity: 0; transform: translateX(-50%) scaleY(0); transform-origin: top; } 100% { opacity: 1; transform: translateX(-50%) scaleY(1); transform-origin: top; } }
        @keyframes continuousPsycho { 0% { filter: hue-rotate(0deg) brightness(100%) blur(0px); transform: scale(1); } 50% { filter: hue-rotate(180deg) brightness(130%) blur(2px); transform: scale(1.02); } 100% { filter: hue-rotate(360deg) brightness(100%) blur(0px); transform: scale(1); } }
        .fade-out { opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }

        /* ========== MAIN LAYER ========== */
        #main-layer { position: relative; width: 100%; min-height: 100vh; opacity: 0; transition: opacity 2s ease-in; display: none; justify-content: center; align-items: center; }
        .house-container { position: relative; width: 100%; max-width: 800px; margin: 0 auto; height: max-content; }
        .house-img { display: block; width: 100%; height: auto; pointer-events: none; transition: opacity 0.3s; }
        .house-svg-map { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; z-index: 20; }
        .house-svg-map polygon { pointer-events: all; cursor: pointer; fill: transparent; }

        /* ========== HAWK LAYER ========== */
        #hawk-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 25; overflow: hidden; }
        .hawk-sprite {
            position: absolute;
            height: 180px;
            width: 50px;
            top: 8%;
            left: 100%;
            animation: hawkFlyAcross 15s linear 1 forwards;
            animation-delay: 2s;
        }
        .hawk-sprite.hawk-repeat { animation-delay: 0s; }
        .hawk-sprite .hawk-flap {
            position: absolute; inset: 0;
            background-image: url('HawkFlySprite.png');
            background-size: 600% 100%;
            background-repeat: no-repeat;
            image-rendering: pixelated;
            animation: hawkFlap 500ms steps(1) infinite;
        }
        .hawk-sprite.hawk-pause-flap .hawk-flap { animation-play-state: paused; }
        .hawk-sprite { pointer-events: auto; cursor: pointer; }
        .hawk-tooltip { position: absolute; background-color: #eaddcf; border: 2px solid #bda88e; padding: 6px 14px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.85rem; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 10000; transform: translate(-50%, -10px) scale(0.9); box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; text-transform: uppercase; color: #d65d0e; }
        .hawk-tooltip.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -35px) scale(1); }

        @keyframes hawkFlyAcross {
            0%      { left: 100%; transform: translateY(-90px) scaleX(1); }
            20%     { left: 75%; transform: translateY(-12px) scaleX(1); }
            43.33%  { left: 60%; transform: translateY(4px) scaleX(1); }
            56.67%  { left: 60%; transform: translateY(4px) scaleX(1); }  /* 2s pause at 60% */
            80%     { left: 25%; transform: translateY(-90px) scaleX(1); }
            100%    { left: -8%; transform: translateY(-180px) scaleX(1); }
        }
        @keyframes hawkFlap {
            0%, 16%   { background-position: 0% 0; }
            17%, 33%  { background-position: 20% 0; }
            34%, 50%  { background-position: 40% 0; }
            51%, 66%  { background-position: 60% 0; }
            67%, 83%  { background-position: 80% 0; }
            84%, 100% { background-position: 100% 0; }
        }

        /* ========== GATTINI, PERSONAGGI & ARREDI ========== */
        #kittens-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 30; transition: opacity 0.4s ease; }
        body.lights-off #kittens-layer { opacity: 0; pointer-events: none; }

        .kitten-unit { position: absolute; width: 38px; height: 38px; background-image: url('CatRecolors1.png'); background-size: 1200% 800%; image-rendering: pixelated; transform: translate(-50%, -100%); transition: left 4s linear, top 4s linear, opacity 0.6s ease; opacity: 1; pointer-events: auto; cursor: pointer; }
        .kitten-unit { background-position: calc(var(--col, 0) * 100% / 11) calc(var(--row, 0) * 100% / 7); }
        .kitten-unit:not(.idle) { --col: calc(var(--base-col, 0) + var(--global-sprite-frame, 1)); }
        .kitten-unit.idle { --col: calc(var(--base-col, 0) + 1); }
        .kitten-unit.teleporting { opacity: 0; transition: left 0s, top 0s, opacity 0.6s ease; pointer-events: none; }

        #marla-char { position: absolute; height: 13%; width: auto; transform: translate(-50%, -100%); cursor: pointer; pointer-events: auto; transition: transform 0.2s; }
        #marla-char:hover { transform: translate(-50%, -100%) scale(1.05); }

        #dodi-char { position: absolute; width: auto; transform: translate(-50%, -100%); cursor: pointer; pointer-events: auto; transition: transform 0.2s; }
        #dodi-char:hover { transform: translate(-50%, -100%) scale(1.05); }

        #milko-char { position: absolute; width: auto; transform: translate(-50%, -100%); cursor: pointer; pointer-events: auto; transition: transform 0.2s; }
        #milko-char:hover { transform: translate(-50%, -100%) scale(1.05); }

        .arredo-unit { position: absolute; width: auto; transform: translate(-50%, -100%); pointer-events: none; }

        .kitten-tooltip { position: absolute; background-color: #eaddcf; border: 2px solid #bda88e; padding: 6px 14px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 0.85rem; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.2s, transform 0.2s; z-index: 99999; transform: translate(-50%, -10px) scale(0.9); box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: center; }
        .kitten-tooltip.active { opacity: 1; pointer-events: auto; transform: translate(-50%, -35px) scale(1); }
        .kitten-tooltip a { color: #d65d0e; text-decoration: none; display: block; text-transform: uppercase; }
        .kitten-tooltip a:hover { text-shadow: 0 0 5px rgba(214,93,14,0.4); }

        #light-flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; z-index: 8000; transition: opacity 0.1s; }
        .flash-active { opacity: 0.8 !important; }

        /* ========== TOOLBAR E MENU A TENDINA ========== */
        .toolbar { position: fixed; top: 20px; right: 20px; z-index: 9000; display: flex; gap: 15px; opacity: 0; transition: opacity 2s ease-in; pointer-events: none; align-items: center; }
        .toolbar.active { pointer-events: auto; }
        .tool-btn { width: 40px; height: 40px; border: none; background: transparent; cursor: pointer; opacity: 0.6; transition: opacity 0.3s, transform 0.3s; animation: gentlePulse 3s infinite ease-in-out; display: flex; align-items: center; justify-content: center; }
        .tool-btn svg { width: 100%; height: 100%; fill: white; filter: drop-shadow(0 0 5px rgba(255,255,255,0.5)); }
        .tool-btn:hover { opacity: 1; transform: scale(1.1); }

        .dropdown-wrapper { position: relative; display: flex; }
        .rooms-dropdown {
            position: absolute; top: 50px; right: 0;
            background-color: #eaddcf; border: 2px solid #bda88e; border-radius: 12px;
            padding: 0.5rem; display: flex; flex-direction: column; gap: 0.3rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            opacity: 0; visibility: hidden; transition: opacity 0.2s, visibility 0.2s, transform 0.2s;
            transform: translateY(-10px); z-index: 10000; min-width: 160px;
        }
        .rooms-dropdown.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .room-dropdown-item {
            color: #3e3228; font-family: 'DM Mono', monospace; font-weight: bold; font-size: 0.85rem;
            padding: 0.6rem 1rem; cursor: pointer; text-transform: uppercase; text-align: center;
            border-radius: 6px; transition: background-color 0.2s, color 0.2s;
            text-decoration: none; display: block;
        }
        .room-dropdown-item:hover { color: #d65d0e; background-color: rgba(62,50,40,0.1); }

        @keyframes gentlePulse { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 0.5; } }
        @keyframes attentionPulse { 0% { transform: scale(1); opacity: 0.7; filter: drop-shadow(0 0 8px rgba(255,230,100,0.6)); } 50% { transform: scale(1.25); opacity: 1; filter: drop-shadow(0 0 20px rgba(255,230,100,1)); } 100% { transform: scale(1); opacity: 0.7; filter: drop-shadow(0 0 8px rgba(255,230,100,0.6)); } }
        .needs-light { animation: attentionPulse 1.5s infinite ease-in-out !important; opacity: 1 !important; }
        .needs-light svg { fill: #ffeba1; }

        /* ========== MODALS ========== */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 10000; display: none; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: block; opacity: 1; }
        .menu-box { background-color: #eaddcf; color: #3e3228; border: 2px solid #bda88e; padding: 1.5rem 2rem; width: fit-content; min-width: 200px; max-width: 300px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.6), inset 0 0 20px rgba(160,140,100,0.2); text-align: center; position: absolute; top: 50%; transform: translateY(-50%) scale(0.9); transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
        .modal-overlay.active .menu-box { transform: translateY(-50%) scale(1); }
        .menu-pos-right { left: calc(50% + 250px); right: auto; }
        .menu-pos-left { right: calc(50% + 250px); left: auto; }
        .menu-box.vision-box { max-width: 600px; width: 80%; min-height: 50vh; text-align: left; display: flex; flex-direction: column; left: 50%; top: 50%; transform: translate(-50%,-50%) scale(0.9); position: absolute; }
        .modal-overlay.active .menu-box.vision-box { transform: translate(-50%,-50%) scale(1); }
        .room-title { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 1rem; border-bottom: 2px solid rgba(62,50,40,0.3); padding-bottom: 0.5rem; font-weight: 900; }
        .room-title a { color: #3e3228; text-decoration: none; transition: color 0.2s ease, text-shadow 0.2s ease; display: inline-block; }
        .room-title a:hover { color: #d65d0e; text-shadow: 0 0 8px rgba(214,93,14,0.3); }
        .artist-list { list-style: none; font-size: 1.1rem; font-weight: bold; padding: 0; }
        .artist-list li { margin: 0.6rem 0; cursor: pointer; transition: color 0.2s, transform 0.2s; }
        .artist-list li:hover { color: #d65d0e; transform: scale(1.05); }
        .artist-list li a { color: inherit; text-decoration: none; display: block; }
        #typewriter { white-space: pre-wrap; text-transform: uppercase; font-size: 0.9rem; line-height: 1.6; flex-grow: 1; color: #3e3228; }
        .lang-switch { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 1rem; }
        .lang-btn { background: transparent; border: 1px solid #3e3228; color: #3e3228; font-family: 'DM Mono', monospace; padding: 2px 8px; font-size: 0.7rem; cursor: pointer; opacity: 0.5; border-radius: 5px; }
        .lang-btn.active { opacity: 1; background: #3e3228; color: #eaddcf; }
        @media (max-width: 768px) {
            .logo { max-width: 55%; max-height: 35vh; margin: 0 auto; }
            .logo-stick { width: 8px; }
            #roomMenuBox { position: fixed; top: auto; left: auto; right: auto; transform: scale(0.9); margin: 0; }
            .menu-pos-right, .menu-pos-left { left: auto; right: auto; }
            .modal-overlay.active { display: flex; justify-content: center; align-items: center; }
            #roomModal.active { display: block; }
            .menu-box.vision-box { transform: scale(0.9); position: relative; top: auto; left: auto; }
            .modal-overlay.active .menu-box.vision-box { transform: scale(1); }
            .toolbar { top: 10px; right: 10px; gap: 10px; }
        }
    </style>
</head>

        <button class="tool-btn" id="btn-audio"><svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
        <button class="tool-btn" id="btn-vision"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg></button>
        <a href="https://www.instagram.com/animalhou_se/" target="_blank" class="tool-btn"><svg viewBox="0 0 24 24"><path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2m-.2 2A3.6 3.6 0 0 0 3.8 7.6v8.8A3.6 3.6 0 0 0 7.6 20.4h8.8a3.6 3.6 0 0 0 3.8-3.8V7.6A3.6 3.6 0 0 0 16.4 4H7.6m9.65 1.5a1.25 1.25 0 0 1 1.25 1.25A1.25 1.25 0 0 1 17.25 8 1.25 1.25 0 0 1 16 6.75a1.25 1.25 0 0 1 1.25-1.25M12 7a5 5 0 0 1 5 5 5 5 0 0 1-5 5 5 5 0 0 1-5-5 5 5 0 0 1 5-5m0 2a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3z"/></svg></a>
    </div>

    <div id="light-flash-overlay"></div>

    <div id="main-layer">
        <div class="house-container" id="houseWrapper">
            <img src="casa.jpg" class="house-img" id="houseImage" alt="Animal House Pixel Art">
            <svg class="house-svg-map" viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

                <polygon data-room="OSSERVATORIO" points="46.91,3.35 77.06,5.82 86.03,29.2 68.68,36.31 35.29,26.44"/>

                <polygon data-room="SALOTTO" points="33.97,27.43 81.32,39.66 52.35,54.36 6.91,39.86"/>

                <polygon data-room="CUCINA" points="6.18,42.42 83.68,62.06 46.76,72.02 9.85,59.2 5.88,43.71 91.91,63.54"/>

                <polygon data-room="CANTINA" points="23.97,63.93 71.76,78.04 52.94,85.05 21.62,72.52 39.85,73.21 80,63.24 76.03,77.74 22.35,72.02"/>

                <polygon data-room="GIARDINO" points="23.38,78.14 48.38,85.34 36.32,90.77 12.79,83.47"/>

                <polygon data-room="CAMPETTO" points="75.44,77.65 87.94,81.99 74.26,87.02 60.88,82.48"/>

            </svg>

            <div id="hawk-layer">
                <div id="hawk-sprite" class="hawk-sprite" aria-hidden="true"><div class="hawk-flap"></div></div>
            </div>

            <div id="kittens-layer">
                <div id="hawk-tooltip" class="hawk-tooltip">FALCO</div>
                <div id="kitten-tooltip" class="kitten-tooltip"><a href="#" id="kitten-tooltip-link"></a></div>

                <img src="personaggi/marla.gif" id="marla-char" alt="Marla" style="left: 33%; top: 90%;">
                <img src="personaggi/dodi.gif" id="dodi-char" alt="Dodi" style="left: 45%; top: 42%; height: 10%;">
                <img src="personaggi/milko1.gif" id="milko-char" alt="Milko" style="left: 33%; top: 63%; height: 10%;">

                <div class="kitten-unit idle" data-id="0"></div>
                <div class="kitten-unit idle" data-id="1"></div>
                <div class="kitten-unit idle" data-id="2"></div>
                <div class="kitten-unit idle" data-id="3"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="roomModal">
        <div class="menu-box" id="roomMenuBox">
            <div class="room-title" id="modalTitle">STANZA</div>
            <ul class="artist-list" id="modalList"></ul>
        </div>
    </div>
    <div class="modal-overlay" id="visionModal">
        <div class="menu-box vision-box">
            <div class="lang-switch">
                <button class="lang-btn" id="btn-it">IT</button>
                <button class="lang-btn" id="btn-en">EN</button>
            </div>
            <div id="typewriter"></div>
        </div>
    </div>

    <audio id="logoAudio" src="logoAudio.mp3" loop></audio>

    <script>
    document.addEventListener('DOMContentLoaded', function() {

        const landingScreen     = document.getElementById('landing-screen');
        const introLayer        = document.getElementById('intro-layer');
        const mainLayer         = document.getElementById('main-layer');
        const toolbar           = document.getElementById('toolbar');
        const introVideo        = document.getElementById('intro-video');
        const bgVideo           = document.getElementById('bgVideo');
        const introLogo         = document.getElementById('intro-logo');
        const introStick        = document.getElementById('intro-stick');
        const houseImage        = document.getElementById('houseImage');
        const houseWrapper      = document.getElementById('houseWrapper');
        const houseSvg          = document.querySelector('.house-svg-map');
        const btnLight          = document.getElementById('btn-light');
        const flashOverlay      = document.getElementById('light-flash-overlay');
        const audio             = document.getElementById('logoAudio');
        const btnAudio          = document.getElementById('btn-audio');
        const roomModal         = document.getElementById('roomModal');
        const roomMenuBox       = document.getElementById('roomMenuBox');
        const modalTitle        = document.getElementById('modalTitle');
        const modalList         = document.getElementById('modalList');
        const visionModal       = document.getElementById('visionModal');
        const visionMenuBox     = document.querySelector('.vision-box');
        const typewriter        = document.getElementById('typewriter');
        const btnVision         = document.getElementById('btn-vision');
        const btnIT             = document.getElementById('btn-it');
        const btnEN             = document.getElementById('btn-en');
        const kittenTooltip     = document.getElementById('kitten-tooltip');
        const kittenTooltipLink = document.getElementById('kitten-tooltip-link');

        const btnRoomsMenu      = document.getElementById('btn-rooms-menu');
        const roomsDropdown     = document.getElementById('rooms-dropdown');

        let kittensStarted = false;
        let currentLang    = 'en';
        let visionLang     = 'en';

        // ── DATI ─────────────────────────────────────────────────
        const roomData = {
            'OSSERVATORIO': { artists: ['CARLO MARTINELLI', 'VERA DI LECCE', 'CRISTÕF'], side: 'right' },
            'SALOTTO':      { artists: ['CORASAN', 'DODI CONTI', 'NO LUCIFER', 'LE CAPRE A SONAGLI'], side: 'left' },
            'CUCINA':       { artists: ['MILKO MALTOSIO', 'CHOCOLATE AND RECORDS'], side: 'right' },
            'CANTINA':      { artists: ['B4BY K4TT', 'LORENZO BENZONI', 'LEMON LIGHTS', 'BORSTAL', 'NOME BAND A PIACERE'], side: 'left' },
            'GIARDINO':      { artists: ['MARLA', 'HAMAKA', 'MIRIAM FORNARI', 'LA BANDA PICCOLA'], side: 'right' },
            'CAMPETTO':     { artists: ['QVINTO', 'KARENINA', 'FUORIROTTA E SENTINELLA', 'ZEUS FEBO'], side: 'left' }
        };

        const roomWaypoints = {
            'OSSERVATORIO': [{x: 56, y: 26}, {x: 60, y: 31}, {x: 48, y: 28}],
            'SALOTTO':      [{x: 57, y: 46}, {x: 60, y: 50}, {x: 45, y: 50}],
            'CUCINA':       [{x: 45, y: 62}, {x: 55, y: 65}, {x: 35, y: 62}],
            'CANTINA':      [{x: 40, y: 75}, {x: 44, y: 78}, {x: 35, y: 75}],
            'GIARDINO':      [{x: 25, y: 81}, {x: 35, y: 85}, {x: 40, y: 84}],
            'CAMPETTO':     [{x: 75, y: 80}, {x: 82, y: 82}, {x: 65, y: 84}]
        };

        const roomNames = Object.keys(roomWaypoints);

        const catRooms = ['OSSERVATORIO', 'GIARDINO', 'CAMPETTO'];

        const occupiedWaypoints = new Set();
        const artistToRoomMap = {};
        const allArtists = [];
        for (const [room, data] of Object.entries(roomData)) {
            data.artists.forEach(artist => {
                artistToRoomMap[artist] = room.toLowerCase() + '.html';
                allArtists.push(artist);
            });
        }

        // ── Z-INDEX DINAMICO ─────────────────────────────────────
        function updateDepth() {
            const sortables = document.querySelectorAll('.kitten-unit, #marla-char, #dodi-char, #milko-char');
            sortables.forEach(el => {
                const rect = el.getBoundingClientRect();
                el.style.zIndex = Math.floor(rect.bottom);
            });
            requestAnimationFrame(updateDepth);
        }
        updateDepth();

        // ── SVG SYNC E GESTIONE MENU A TENDINA ───────────────────
        btnRoomsMenu.addEventListener('click', (e) => {
            e.stopPropagation();
            roomsDropdown.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            roomsDropdown.classList.remove('active');
        });

        roomsDropdown.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        function syncSvgToImage() {
            if (mainLayer.style.display === 'none') return;
            const imgRect  = houseImage.getBoundingClientRect();
            const wrapRect = houseWrapper.getBoundingClientRect();
            houseSvg.style.left   = (imgRect.left - wrapRect.left) + 'px';
            houseSvg.style.top    = (imgRect.top  - wrapRect.top)  + 'px';
            houseSvg.style.width  = imgRect.width  + 'px';
            houseSvg.style.height = imgRect.height + 'px';
        }
        if (houseImage.complete) syncSvgToImage();
        houseImage.addEventListener('load', syncSvgToImage);
        window.addEventListener('resize', syncSvgToImage);
        window.addEventListener('orientationchange', () => setTimeout(syncSvgToImage, 300));

        function showHouseDirectly() {
            landingScreen.style.display = 'none';
            introLayer.style.display    = 'none';

            mainLayer.style.display = 'flex';
            mainLayer.style.opacity = '1';
            toolbar.style.opacity   = '1';
            toolbar.classList.add('active');
            document.body.style.overflowY = 'auto';

            if (bgVideo)    { bgVideo.pause();    bgVideo.currentTime = 0; }
            if (introVideo) { introVideo.pause(); introVideo.currentTime = 0; }

            syncSvgToImage();

            if (!kittensStarted) { startKittens(); kittensStarted = true; }
        }

        if (sessionStorage.getItem('houseEntered') === 'true') {
            showHouseDirectly();
        } else {
            if (bgVideo) bgVideo.play().catch(e => console.log('Autoplay landing:', e));
        }

        const contentLang = {
            en: { tagline: 'ANIMAL HOUSE IS WHAT IT IS THAT YOU LIKE', vision: 'VISION',  touch: 'TOUCH' },
            it: { tagline: 'ANIMAL HOUSE È QUELLO CHE È SE TI PIACE',  vision: 'VISIONE', touch: 'CONTATTO' }
        };
        function setLanguage(lang) {
            currentLang = lang; visionLang = lang;
            document.querySelector('.landing-tagline').textContent = contentLang[lang].tagline;
            document.querySelectorAll('.landing-links a')[0].textContent = contentLang[lang].vision;
            document.querySelectorAll('.landing-links a')[1].textContent = contentLang[lang].touch;
            document.documentElement.lang = lang;
            localStorage.setItem('preferredLanguage', lang);
            adjustTagline();
        }
        const storedLang = localStorage.getItem('preferredLanguage');
        if (storedLang) { setLanguage(storedLang); }
        else {
            fetch('https://ipinfo.io/json?token=58560eedaa6c7d')
                .then(r => r.json())
                .then(d => setLanguage(d.country === 'IT' ? 'it' : 'en'))
                .catch(() => setLanguage('en'));
        }
        document.getElementById('langToggle').addEventListener('click', () => setLanguage(currentLang === 'en' ? 'it' : 'en'));
        function adjustTagline() {
            const t = document.querySelector('.landing-tagline');
            if (!t) return;
            if (window.innerWidth <= 800) { if (!t.innerHTML.includes('<br>')) t.innerHTML = t.innerHTML.replace('Animal House', 'Animal House<br>'); }
            else { t.innerHTML = t.innerHTML.replace('<br>', ''); }
        }
        window.addEventListener('resize', adjustTagline);

        function startExperience(e) {
            e.preventDefault();
            sessionStorage.setItem('houseEntered', 'true');

            landingScreen.style.opacity = '0';
            setTimeout(() => {
                landingScreen.style.visibility = 'hidden';
                landingScreen.style.display    = 'none';
                if (bgVideo) bgVideo.pause();
            }, 1000);

            introLayer.style.display = 'flex';
            setTimeout(() => { introLayer.style.opacity = '1'; }, 50);

            introLogo.classList.add('anim-logo');
            introStick.classList.add('anim-stick');

            if (introVideo) {
                introVideo.load();
                introVideo.muted = true;
                introVideo.play().catch(err => console.log('Intro video:', err));
            }

            setTimeout(() => {
                introLayer.classList.add('fade-out');
                showHouseDirectly();
            }, 7000);
        }

        document.getElementById('landing-trigger').addEventListener('click', startExperience);
        document.getElementById('vision-link').addEventListener('click', startExperience);

        let isPlaying = false;
        btnAudio.addEventListener('click', (e) => {
            e.stopPropagation();
            if (isPlaying) { audio.pause(); btnAudio.style.opacity = '0.5'; }
            else           { audio.play();  btnAudio.style.opacity = '1'; }
            isPlaying = !isPlaying;
        });

        let lightsOn = sessionStorage.getItem('lightsOn') === 'true';
        function updateLightUI() {
            houseImage.src = lightsOn ? 'casa2.jpg' : 'casa.jpg';
            if (lightsOn) { btnLight.classList.remove('needs-light'); document.body.classList.remove('lights-off'); }
            else          { btnLight.classList.add('needs-light');    document.body.classList.add('lights-off'); }
        }
        updateLightUI();
        btnLight.addEventListener('click', (e) => {
            e.stopPropagation(); lightsOn = !lightsOn;
            sessionStorage.setItem('lightsOn', lightsOn); updateLightUI();
            flashOverlay.classList.add('flash-active');
            setTimeout(() => flashOverlay.classList.remove('flash-active'), 150);
        });

        document.querySelectorAll('.house-svg-map polygon').forEach(zone => {
            zone.addEventListener('click', function(e) { e.stopPropagation(); openRoom(this.getAttribute('data-room')); });
        });

        // ==========================================
        // GESTIONE ZOOM MODALI (ROOM E VISION)
        // ==========================================
        function positionRoomModal() {
            if (window.innerWidth > 768) {
                roomMenuBox.style.transform = '';
                roomMenuBox.style.position = '';
                roomMenuBox.style.left = '';
                roomMenuBox.style.top = '';
                roomMenuBox.style.width = '';
                return;
            }

            const vvp = window.visualViewport;
            if (!vvp) return;

            const centerX = vvp.offsetLeft + (vvp.width / 2);
            const centerY = vvp.offsetTop + (vvp.height / 2);

            const currentScale = vvp.scale || 1;
            const invScale = 1 / currentScale;

            roomMenuBox.style.position = 'absolute';
            roomMenuBox.style.left = centerX + 'px';
            roomMenuBox.style.top = centerY + 'px';
            roomMenuBox.style.width = '280px';
            roomMenuBox.style.transform = `translate(-50%, -50%) scale(${invScale})`;
        }

        function positionVisionModal() {
            if (window.innerWidth > 768) {
                visionMenuBox.style.transform = '';
                visionMenuBox.style.position = '';
                visionMenuBox.style.left = '';
                visionMenuBox.style.top = '';
                visionMenuBox.style.width = '';
                return;
            }

            const vvp = window.visualViewport;
            if (!vvp) return;

            const centerX = vvp.offsetLeft + (vvp.width / 2);
            const centerY = vvp.offsetTop + (vvp.height / 2);

            const currentScale = vvp.scale || 1;
            const invScale = 1 / currentScale;

            visionMenuBox.style.position = 'absolute';
            visionMenuBox.style.left = centerX + 'px';
            visionMenuBox.style.top = centerY + 'px';
            visionMenuBox.style.width = '85%'; // leggermente più stretto per i bordi su mobile
            visionMenuBox.style.transform = `translate(-50%, -50%) scale(${invScale})`;
        }

        if (window.visualViewport) {
            window.visualViewport.addEventListener('scroll', () => {
                if (roomModal.classList.contains('active')) positionRoomModal();
                if (visionModal.classList.contains('active')) positionVisionModal();
            });
            window.visualViewport.addEventListener('resize', () => {
                if (roomModal.classList.contains('active')) positionRoomModal();
                if (visionModal.classList.contains('active')) positionVisionModal();
            });
        }

        function openRoom(name) {
            const data = roomData[name]; if (!data) return;
            modalTitle.innerHTML = `<a href="${name.toLowerCase()}.html">${name}</a>`;
            modalList.innerHTML = '';
            data.artists.forEach(artist => {
                const li = document.createElement('li');
                const a  = document.createElement('a');
                a.href = artistToRoomMap[artist]; a.textContent = artist;
                li.appendChild(a); modalList.appendChild(li);
            });
            roomMenuBox.classList.remove('menu-pos-left','menu-pos-right');
            roomMenuBox.classList.add(data.side === 'left' ? 'menu-pos-left' : 'menu-pos-right');
            roomModal.classList.add('active');
            positionRoomModal();
        }

        [roomModal, visionModal].forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) { roomModal.classList.remove('active'); visionModal.classList.remove('active'); stopTypewriter(); }
            });
        });

        btnVision.addEventListener('click', (e) => {
            e.stopPropagation();
            visionModal.classList.add('active');
            startTypewriter();
            positionVisionModal();
        });

        const contentIT = `TOCCA I POSTI DELLA CASA PER SCOPRIRE AMBIENTI E ANIMALI.\n\nANIMAL HOUSE È UNA CASA VIRTUALE E FISICA DOVE ARTISTI COLLABORANO IN MODO SELVAGGIO, SU CONNESSIONI EMOTIVE E UMANE. FACCIAMO COSE LEGGERE O COSE PESANTI, A SECONDA DELLA SITUAZIONE. SE VUOI, TOCCACI..\n\n[ TOCCACI ]`;
        const contentEN = `TOUCH THE SPOTS OF THE HOUSE TO DISCOVER ROOMS AND ANIMALS.\n\nANIMAL HOUSE IS A COLLECTIVE OF ARTISTS WHO COLLABORATE IN A WILD WAY, BASED ON EMOTIONAL AND HUMAN CONNECTIONS. WE DO LIGHT THINGS OR HEAVY THINGS, IF YOU WANT YOU CAN TOUCH US...\n\n[ TOUCH US ]`;
        let typeInterval;
        btnIT.addEventListener('click', (e) => { e.stopPropagation(); setVisionLang('it'); });
        btnEN.addEventListener('click', (e) => { e.stopPropagation(); setVisionLang('en'); });
        function setVisionLang(lang) { visionLang = lang; btnIT.classList.toggle('active', lang==='it'); btnEN.classList.toggle('active', lang==='en'); startTypewriter(); }
        function startTypewriter() {
            clearInterval(typeInterval); typewriter.innerHTML = '';
            const text = visionLang === 'it' ? contentIT : contentEN;
            let i = 0;
            typeInterval = setInterval(() => {
                if (i < text.length) { typewriter.innerHTML += text.charAt(i); i++; }
                else { clearInterval(typeInterval); finalizeText(); }
            }, 30);
        }
        function stopTypewriter() { clearInterval(typeInterval); }
        function finalizeText() {
            const text = visionLang === 'it' ? contentIT : contentEN;
            typewriter.innerHTML = text
                .replace('[ TOCCACI ]', '<a href="https://www.instagram.com/animalhou_se/" target="_blank" style="color:#d65d0e;font-weight:bold;text-decoration:none;">[ TOCCACI ]</a>')
                .replace('[ TOUCH US ]', '<a href="https://www.instagram.com/animalhouse_collective" target="_blank" style="color:#d65d0e;font-weight:bold;text-decoration:none;">[ TOUCH US ]</a>');
        }
        typewriter.addEventListener('click', () => { clearInterval(typeInterval); finalizeText(); });

        function assignIdentity(kitten) {
            const validArtists = allArtists.filter(a => a !== 'MARLA' && a !== 'DODI CONTI' && a !== 'MILKO MALTOSIO');
            const randomArtist = validArtists[Math.floor(Math.random() * validArtists.length)];
            kitten.dataset.artist   = randomArtist;
            kitten.dataset.roomLink = artistToRoomMap[randomArtist];
            kitten.style.backgroundImage = `url('CatRecolors${Math.floor(Math.random()*3)+1}.png')`;
            const baseCols = [0,3,6,9];
            kitten.style.setProperty('--base-col', baseCols[Math.floor(Math.random()*baseCols.length)]);
        }
        let spriteFrame = 0;
        setInterval(() => {
            spriteFrame = (spriteFrame + 1) % 4;
            document.documentElement.style.setProperty('--global-sprite-frame', [0,1,2,1][spriteFrame]);
        }, 200);

        document.addEventListener('click', () => {
            kittenTooltip.classList.remove('active');
            const ht = document.getElementById('hawk-tooltip');
            if (ht) ht.classList.remove('active');
        });
        kittenTooltip.addEventListener('click', e => e.stopPropagation());

        function startKittens() {
            const marlaChar = document.getElementById('marla-char');
            if (marlaChar) {
                marlaChar.addEventListener('click', (e) => {
                    e.stopPropagation();
                    kittenTooltipLink.textContent = 'MARLA';
                    kittenTooltipLink.href = artistToRoomMap['MARLA'];
                    kittenTooltip.style.left = marlaChar.style.left;
                    kittenTooltip.style.top  = marlaChar.style.top;
                    kittenTooltip.classList.add('active');
                    setTimeout(() => kittenTooltip.classList.remove('active'), 4000);
                });
            }

            const dodiChar = document.getElementById('dodi-char');
            if (dodiChar) {
                dodiChar.addEventListener('click', (e) => {
                    e.stopPropagation();
                    kittenTooltipLink.textContent = 'DODI';
                    kittenTooltipLink.href = '#';
                    kittenTooltip.style.left = dodiChar.style.left;
                    kittenTooltip.style.top  = dodiChar.style.top;
                    kittenTooltip.classList.add('active');
                    setTimeout(() => kittenTooltip.classList.remove('active'), 4000);
                });
            }

            const milkoChar = document.getElementById('milko-char');
            if (milkoChar) {
                milkoChar.addEventListener('click', (e) => {
                    e.stopPropagation();
                    kittenTooltipLink.textContent = 'MILKO';
                    kittenTooltipLink.href = '#';
                    kittenTooltip.style.left = milkoChar.style.left;
                    kittenTooltip.style.top  = milkoChar.style.top;
                    kittenTooltip.classList.add('active');
                    setTimeout(() => kittenTooltip.classList.remove('active'), 4000);
                });
            }

            const kittens = document.querySelectorAll('.kitten-unit');
            const shuffledRooms = [...catRooms].sort(() => 0.5 - Math.random());
            kittens.forEach((kitten, i) => {
                const initialRoom  = shuffledRooms[i % shuffledRooms.length];
                const initialPoint = 0;
                occupiedWaypoints.add(`${initialRoom}-${initialPoint}`);
                kitten.dataset.room  = initialRoom;
                kitten.dataset.point = initialPoint;
                assignIdentity(kitten);
                kitten.style.transition = 'none';
                kitten.style.left = roomWaypoints[initialRoom][initialPoint].x + '%';
                kitten.style.top  = roomWaypoints[initialRoom][initialPoint].y + '%';
                void kitten.offsetWidth;
                kitten.style.transition = '';
                kitten.addEventListener('click', (e) => {
                    e.stopPropagation();
                    kittenTooltipLink.textContent = kitten.dataset.artist;
                    kittenTooltipLink.href = kitten.dataset.roomLink;
                    kittenTooltip.style.left = kitten.style.left;
                    kittenTooltip.style.top  = kitten.style.top;
                    kittenTooltip.classList.add('active');
                    setTimeout(() => kittenTooltip.classList.remove('active'), 4000);
                });
                animateKitten(kitten);
            });
        }

        /* ========== HAWK LAYER ========== */
        const hawkSprite = document.getElementById('hawk-sprite');
        const hawkTooltip = document.getElementById('hawk-tooltip');
        if (hawkSprite) {
            if (hawkTooltip) {
                hawkSprite.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const rect = hawkSprite.getBoundingClientRect();
                    const wrap = houseWrapper.getBoundingClientRect();
                    hawkTooltip.style.left = ((rect.left - wrap.left + rect.width / 2) / wrap.width * 100) + '%';
                    hawkTooltip.style.top = ((rect.top - wrap.top) / wrap.height * 100) + '%';
                    hawkTooltip.classList.add('active');
                    setTimeout(() => hawkTooltip.classList.remove('active'), 4000);
                });
                hawkTooltip.addEventListener('click', e => e.stopPropagation());
            }
            const PAUSE_AT_MS = 6500;
            const RESUME_AT_MS = 8500;
            function scheduleFlapPause() {
                hawkSprite.classList.remove('hawk-pause-flap');
                clearTimeout(hawkSprite._pauseFlapT1);
                clearTimeout(hawkSprite._resumeFlapT2);
                hawkSprite._pauseFlapT1 = setTimeout(() => hawkSprite.classList.add('hawk-pause-flap'), PAUSE_AT_MS);
                hawkSprite._resumeFlapT2 = setTimeout(() => hawkSprite.classList.remove('hawk-pause-flap'), RESUME_AT_MS);
            }
            function restartHawkFly() {
                hawkSprite.classList.remove('hawk-pause-flap');
                hawkSprite.style.animation = 'none';
                void hawkSprite.offsetWidth;
                hawkSprite.classList.add('hawk-repeat');
                hawkSprite.style.animation = 'hawkFlyAcross 15s linear 1 forwards';
                hawkSprite.style.animationDelay = '0s';
                scheduleFlapPause();
            }
            hawkSprite.addEventListener('animationstart', function(e) {
                if (e.animationName === 'hawkFlyAcross') scheduleFlapPause();
            });
            hawkSprite.addEventListener('animationend', function(e) {
                if (e.animationName === 'hawkFlyAcross') {
                    clearTimeout(hawkSprite._pauseFlapT1);
                    clearTimeout(hawkSprite._resumeFlapT2);
                    const delay = 1000 + Math.random() * 9000;
                    setTimeout(restartHawkFly, delay);
                }
            });
        }

        function animateKitten(kittenElem) {
            const nextMoveDelay = Math.random() * 5000 + 2000;
            setTimeout(() => {
                const currentRoom     = kittenElem.dataset.room;
                const currentPointIdx = parseInt(kittenElem.dataset.point);
                const shouldTeleport  = Math.random() > 0.6;
                let targetRoom = currentRoom;
                let availablePoints = [];
                if (shouldTeleport) {
                    const otherRooms = catRooms.filter(r => r !== currentRoom);
                    targetRoom = otherRooms[Math.floor(Math.random() * otherRooms.length)];
                    roomWaypoints[targetRoom].forEach((pt, idx) => { if (!occupiedWaypoints.has(`${targetRoom}-${idx}`)) availablePoints.push(idx); });
                } else {
                    roomWaypoints[currentRoom].forEach((pt, idx) => { if (idx !== currentPointIdx && !occupiedWaypoints.has(`${currentRoom}-${idx}`)) availablePoints.push(idx); });
                }
                if (availablePoints.length === 0) { setTimeout(() => animateKitten(kittenElem), 2000); return; }
                const targetPointIdx = availablePoints[Math.floor(Math.random() * availablePoints.length)];
                const target  = roomWaypoints[targetRoom][targetPointIdx];
                const current = roomWaypoints[currentRoom][currentPointIdx];
                occupiedWaypoints.delete(`${currentRoom}-${currentPointIdx}`);
                occupiedWaypoints.add(`${targetRoom}-${targetPointIdx}`);
                kittenElem.dataset.room  = targetRoom;
                kittenElem.dataset.point = targetPointIdx;
                const dx = target.x - current.x; const dy = target.y - current.y;
                let row = 0;
                if (Math.abs(dx) > Math.abs(dy)) { row = dx > 0 ? 2 : 1; } else { row = dy > 0 ? 0 : 3; }
                kittenElem.style.setProperty('--row', row);
                if (shouldTeleport) {
                    kittenTooltip.classList.remove('active');
                    assignIdentity(kittenElem);
                    kittenElem.classList.add('teleporting');
                    setTimeout(() => {
                        kittenElem.classList.add('idle');
                        kittenElem.style.setProperty('--row', 0);
                        kittenElem.style.left = target.x + '%';
                        kittenElem.style.top  = target.y + '%';
                        setTimeout(() => { kittenElem.classList.remove('teleporting'); animateKitten(kittenElem); }, 1000 + Math.random() * 2000);
                    }, 650);
                } else {
                    kittenElem.classList.remove('idle');
                    kittenElem.style.left = target.x + '%';
                    kittenElem.style.top  = target.y + '%';
                    setTimeout(() => { kittenElem.classList.add('idle'); animateKitten(kittenElem); }, 4000);
                }
            }, nextMoveDelay);
        }

    });

    window.addEventListener('pagehide', function(event) {
        var iv = document.getElementById('intro-video');
        var bv = document.getElementById('bgVideo');
        if (iv) { iv.pause(); iv.removeAttribute('src'); iv.load(); }
        if (bv) { bv.pause(); bv.removeAttribute('src'); bv.load(); }
    });

    window.addEventListener('pageshow', function(event) {
        var intro = document.getElementById('intro-layer');
        var iv    = document.getElementById('intro-video');

        if (sessionStorage.getItem('houseEntered') === 'true') {
            var landing = document.getElementById('landing-screen');
            var main    = document.getElementById('main-layer');
            var tb      = document.getElementById('toolbar');
            if (iv) { iv.pause(); iv.removeAttribute('src'); iv.load(); }
            if (landing) { landing.style.display = 'none'; }
            if (intro)   { intro.style.display = 'none'; intro.style.opacity = '0'; }
            if (main)  { main.style.display = 'flex'; main.style.opacity = '1'; }
            if (tb)    { tb.style.opacity = '1'; tb.classList.add('active'); }
            document.body.style.overflowY = 'auto';
        }
    });
    </script>
</body>
</html>
